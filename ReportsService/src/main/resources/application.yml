spring:
  application:
    name: reports-service

  datasource:
    url: jdbc:postgresql://localhost:5432/reports-db
    username: reports_app
    password: reports_app
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

  rabbitmq:
    host: localhost
    port: 5672
    username: urban
    password: urban
    virtual-host: /
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 16
        retry:
          enabled: true
          initial-interval: 2s
          max-attempts: 3
          multiplier: 2.0

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:5222

  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    time-zone: UTC

server:
  port: 8081
