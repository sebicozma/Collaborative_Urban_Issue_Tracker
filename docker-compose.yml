services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: urban-rabbitmq
    hostname: urban-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: urban
      RABBITMQ_DEFAULT_PASS: urban
      RABBITMQ_DEFAULT_VHOST: /
    volumes:
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: urban-postgres
    hostname: urban-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: postgres
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  identity-service:
    build:
      context: ./UrbanIssuesIdentity
    container_name: urban-identity
    hostname: urban-identity
    ports:
      - "5222:5222"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=urban-postgres;Port=5432;Database=identity-db;Username=identity_app;Password=identity_app
      RabbitMq__HostName: urban-rabbitmq
      RabbitMq__Port: 5672
      RabbitMq__UserName: urban
      RabbitMq__Password: urban
      RabbitMq__VirtualHost: /
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  reports-service:
    build:
      context: ./ReportsService
    container_name: urban-reports
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://urban-postgres:5432/reports-db
      SPRING_DATASOURCE_USERNAME: reports_app
      SPRING_DATASOURCE_PASSWORD: reports_app
      SPRING_RABBITMQ_HOST: urban-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: urban
      SPRING_RABBITMQ_PASSWORD: urban
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://urban-identity:5222
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  ai-classification:
    build:
      context: ./AIClassificationService
    container_name: urban-ai-classification
    ports:
      - "8083:8000"
    environment:
      RABBITMQ_URL: amqp://urban:urban@urban-rabbitmq:5672/
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      MODEL_VERSION: gpt-4o-2024-05-13
    depends_on:
      rabbitmq:
        condition: service_healthy

  notifications-service:
    build:
      context: ./NotificationsService
    container_name: urban-notifications
    ports:
      - "8082:8082"
    environment:
      SPRING_RABBITMQ_HOST: urban-rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: urban
      SPRING_RABBITMQ_PASSWORD: urban
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      SPRING_MAIL_USERNAME: "noreply.urban.pulse@gmail.com"              # Gmail address used as sender
      SPRING_MAIL_PASSWORD: ${GMAIL_APP_PASSWORD:-}            # Gmail app password, read from .env at repo root
      NOTIFICATIONS_MAIL_FROM: "noreply.urban.pulse@gmail.com"           # sender shown on outgoing emails
      NOTIFICATIONS_MAIL_ADMIN_ADDRESS: ""  # recipient for report status-change emails
    depends_on:
      rabbitmq:
        condition: service_healthy

  api-gateway:
    build:
      context: ./api-gateway
    container_name: urban-gateway
    hostname: urban-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      REPORTS_SERVER_URL: http://urban-reports:8081
      IDENTITY_SERVER_URL: http://urban-identity:5222
    depends_on:
      - reports-service
      - identity-service

volumes:
  rabbitmq-data:
  postgres-data:
